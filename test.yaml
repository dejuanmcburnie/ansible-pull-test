---
- name: Install dependencies for vind cluster creation
  hosts: localhost
  connection: local
  become: true
  gather_facts: true

  vars:
    vind_runtime_disk_by_id: "/dev/disk/by-id/usb-Samsung_SSD_870_EVO_500G_0000AB1234AD-0:0"
    vind_runtime_label: "VINDRUNTIME"
    vind_runtime_mount: "/mnt/vind-runtime-disk"
    
    docker_runtime_dir: "{{ vind_runtime_mount }}/docker"
    containerd_runtime_dir: "{{ vind_runtime_mount }}/containerd"
    vind_runtime_dir: "{{ vind_runtime_mount }}/vind-runtime"
    
    wipe_vind_runtime_disk: true
    # Pin these as needed

    # Git repo that stores clusters/<hostname>.txt
    vcluster_inventory_repo_url: "git@github.com:dejuanmcburnie/ansible-pull-test.git"
    vcluster_inventory_repo_branch: "main"
    vcluster_inventory_repo_dir: "/opt/vcluster-inventory-repo"
    vcluster_inventory_subdir: "clusters"

    # For ansible-pull running as root on the PXE client
    github_ssh_key_path: "/root/.ssh/github_vcluster_inventory"

    # Use ansible_hostname for ansible-pull; override with -e if needed
    cluster_inventory_host_key: "{{ ansible_hostname | default(inventory_hostname) }}"

    restore_clusters_from_inventory: true

    nfs_mount_point: /mnt/vind-backing
    
    work_dir: "{{ nfs_mount_point }}/work"
    backup_dir: "{{ nfs_mount_point }}/backups"
    snapshot_path: "{{ vind_cluster_name }}.tar.gz"
    
    kubectl_version: "v1.34.0"
    vcluster_version: "latest"

    vind_home: "/home/{{ vind_user }}"
    vind_kubeconfig_dir: "{{ vind_home }}/.kube"

    vind_user: user
    vind_cluster_name: staging-cluster-1
    vind_cluster_prefix: staging-cluster-1

    test_namespace: staging
    test_app_name: test-web-app

    # work_dir: /opt/vind-snapshot-test
    # backup_dir: /opt/vind-snapshot-test/backups
    # snapshot_path: "/opt/vind-snapshot-test/backups/{{ vind_cluster_name }}.tar.gz"
    app_manifest_path: "{{ work_dir }}/stateful-test-app.yaml"


    wait_before_delete_seconds: 120
    wait_after_restore_seconds: 30

    vind_home: "/home/{{ vind_user }}"
    vind_kubeconfig: "/home/{{ vind_user }}/.kube/config"

    cleanup_existing_cluster_first: true

    nfs_server: "192.168.68.50"
    nfs_export: "/srv/nfs/vind-backing"
    nfs_mount_point: "/mnt/vind-backing"
    nfs_mount_owner: "user"
    nfs_mount_group: "user"

  tasks:
    - name: Create test file
      copy:
        dest: /tmp/ansible-pull-worked.txt
        content: |
          ansible-pull worked
          hostname={{ ansible_hostname }}
          date={{ ansible_date_time.iso8601 }}
        
    - name: Ensure curl is installed
      package:
        name: curl
        state: present

    - name: Record curl path
      shell: "command -v curl > /tmp/curl-path.txt"
      changed_when: false

    - name: Show success message
      debug:
        msg: "ansible-pull test completed"

    - name: Map CPU architecture
      ansible.builtin.set_fact:
        linux_arch: "{{ arch_map[ansible_architecture] | default(ansible_architecture) }}"
      vars:
        arch_map:
          x86_64: amd64
          aarch64: arm64
          arm64: arm64
          amd64: amd64

    - name: Install NFS client package
      ansible.builtin.apt:
        name: nfs-common
        state: present
        update_cache: true

    - name: Create NFS mount point
      ansible.builtin.file:
        path: "{{ nfs_mount_point }}"
        state: directory
        owner: "{{ vind_user }}"
        group: "{{ vind_user }}"
        mode: "0755"

    - name: Add NFS mount to fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: "^{{ nfs_server | regex_escape }}:{{ nfs_export | regex_escape }}\\s+{{ nfs_mount_point | regex_escape }}\\s+"
        line: "{{ nfs_server }}:{{ nfs_export }} {{ nfs_mount_point }} nfs4 defaults,nofail,_netdev,x-systemd.automount,x-systemd.device-timeout=10 0 0"
        state: present
        create: true
        backup: true

    - name: Reload systemd after fstab change
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Mount NFS filesystem
      ansible.builtin.shell: |
        set -eux
        mkdir -p "{{ nfs_mount_point }}"
        mountpoint -q "{{ nfs_mount_point }}" || mount "{{ nfs_mount_point }}"
      args:
        executable: /bin/bash
      register: mount_nfs_result
      changed_when: true

    - name: Verify NFS mount
      ansible.builtin.command: "findmnt {{ nfs_mount_point }}"
      register: findmnt_result
      changed_when: false

    - name: Show mounted NFS filesystem
      ansible.builtin.debug:
        var: findmnt_result.stdout_lines

    - name: Create NFS-backed vind work directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ vind_user }}"
        group: "{{ vind_user }}"
        mode: "0755"
      loop:
        - "{{ work_dir }}"
        - "{{ backup_dir }}"

    - name: Set vCluster download URL
      ansible.builtin.set_fact:
        vcluster_download_url: >-
          {{
            'https://github.com/loft-sh/vcluster/releases/latest/download/vcluster-linux-' ~ linux_arch
            if vcluster_version == 'latest'
            else
            'https://github.com/loft-sh/vcluster/releases/download/' ~ vcluster_version ~ '/vcluster-linux-' ~ linux_arch
          }}

    - name: Install required OS packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - wget
          - gnupg
          - git
          - iproute2
          - iptables
          - uidmap
          - conntrack
          - socat
          - dbus
          - docker.io
          - python3
          - python3-apt
          - e2fsprogs
          - util-linux
          - parted
        state: present
        update_cache: true

    - name: Enable and start Docker
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    - name: Correct docker permissions
      shell: "sudo usermod -aG docker $USER ; newgrp docker"

    - name: Add vind user to docker group
      ansible.builtin.user:
        name: "{{ vind_user }}"
        groups: docker
        append: true
      when: vind_user != "root"

    - name: Create kubeconfig directory
      ansible.builtin.file:
        path: "{{ vind_kubeconfig_dir }}"
        state: directory
        owner: "{{ vind_user }}"
        group: "{{ vind_user }}"
        mode: "0755"

    - name: Install vCluster CLI
      ansible.builtin.get_url:
        url: "{{ vcluster_download_url }}"
        dest: /usr/local/bin/vcluster
        mode: "0755"
        force: true

    - name: Install kubectl
      ansible.builtin.get_url:
        url: "https://dl.k8s.io/release/{{ kubectl_version }}/bin/linux/{{ linux_arch }}/kubectl"
        dest: /usr/local/bin/kubectl
        mode: "0755"
        force: true

    - name: Ensure docker group exists
      ansible.builtin.group:
        name: docker
        state: present

    - name: Add vind user to docker group
      ansible.builtin.user:
        name: "{{ vind_user }}"
        groups: docker
        append: true

    - name: Configure Docker daemon group and DNS
      ansible.builtin.copy:
        dest: /etc/docker/daemon.json
        mode: "0644"
        content: |
          {
            "group": "docker",
            "dns": ["8.8.8.8", "1.1.1.1"]
          }

    - name: Restart Docker after daemon config change
      ansible.builtin.systemd:
        name: docker
        state: restarted
        enabled: true
        daemon_reload: true

    - name: Wait for Docker socket to exist
      ansible.builtin.wait_for:
        path: /run/docker.sock
        state: present
        timeout: 30

    - name: Force Docker socket ownership and mode
      ansible.builtin.shell: |
        set -eux
        chgrp docker /run/docker.sock
        chmod 660 /run/docker.sock
        ls -l /run/docker.sock
      args:
        executable: /bin/bash
      register: docker_socket_fix
      changed_when: true

    - name: Show Docker socket permissions
      ansible.builtin.debug:
        var: docker_socket_fix.stdout_lines

    - name: Verify vind user has docker group
      ansible.builtin.command: "id {{ vind_user }}"
      register: vind_user_groups
      changed_when: false

    - name: Show vind user groups
      ansible.builtin.debug:
        var: vind_user_groups.stdout

    - name: Verify Docker access as vind user through docker group shell
      ansible.builtin.shell: |
        set -eux
        id
        sg docker -c 'docker ps'
      args:
        executable: /bin/bash
      become_user: "{{ vind_user }}"
      environment:
        HOME: "{{ vind_home }}"
      register: vind_user_docker_ps
      changed_when: false
      
    - name: Set vCluster driver to Docker
      ansible.builtin.command: vcluster use driver docker
      environment:
        HOME: "{{ vind_home }}"
        KUBECONFIG: "{{ vind_home }}/.kube/config"
      register: vcluster_driver_result
      changed_when: "'docker' in vcluster_driver_result.stdout | lower"
      failed_when: false

    - name: Verify Docker is working
      ansible.builtin.command: docker version
      register: docker_version_result
      changed_when: false

    - name: Verify vCluster CLI
      ansible.builtin.command: vcluster --version
      register: vcluster_version_result
      changed_when: false

    - name: Verify kubectl
      ansible.builtin.command: kubectl version --client=true
      register: kubectl_version_result
      changed_when: false

    - name: Show installed dependency versions
      ansible.builtin.debug:
        msg:
          - "{{ docker_version_result.stdout_lines }}"
          - "{{ vcluster_version_result.stdout_lines }}"
          - "{{ kubectl_version_result.stdout_lines }}"

    # - name: Verify required commands exist
    #   ansible.builtin.command: "command -v {{ item }}"
    #   loop:
    #     - docker
    #     - vcluster
    #     - kubectl
    #   register: required_commands
    #   changed_when: false

    - name: Stop Docker and containerd before moving runtime storage
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
      loop:
        - docker
        - containerd
      failed_when: false

    - name: Stop Docker before configuring USB/SSD runtime disk
      ansible.builtin.systemd:
        name: docker
        state: stopped
      failed_when: false

    - name: Stop containerd before configuring USB/SSD runtime disk
      ansible.builtin.systemd:
        name: containerd
        state: stopped
      failed_when: false

    # - name: Confirm requested runtime disk exists
    #   ansible.builtin.stat:
    #     path: "{{ vind_runtime_disk }}"
    #   register: vind_runtime_disk_stat

    # - name: Fail if runtime disk does not exist
    #   ansible.builtin.fail:
    #     msg: "Runtime disk {{ vind_runtime_disk }} does not exist. Check lsblk before continuing."
    #   when: not vind_runtime_disk_stat.stat.exists

    # - name: Safety check runtime disk is not loop or root device
    #   ansible.builtin.assert:
    #     that:
    #       - vind_runtime_disk is match('^/dev/sd[a-z]$')
    #       - vind_runtime_disk != '/dev/sda'
    #     fail_msg: |
    #       Refusing to wipe {{ vind_runtime_disk }}.

    #       This task is intentionally limited to /dev/sdX style disks and refuses /dev/sda.
    #       Confirm the USB SSD with:
    #       lsblk -f

    # - name: Show current runtime disk layout before wipe
    #   ansible.builtin.command: "lsblk -f {{ vind_runtime_disk }}"
    #   register: runtime_disk_before
    #   changed_when: false
    #   failed_when: false

    # - name: Print current runtime disk layout before wipe
    #   ansible.builtin.debug:
    #     var: runtime_disk_before.stdout_lines

    - name: Unmount old runtime bind mounts
      ansible.builtin.shell: |
        set -eux
        systemctl stop docker containerd 2>/dev/null || true

        umount /var/lib/docker 2>/dev/null || true
        umount /var/lib/containerd 2>/dev/null || true
        umount /var/lib/vind-runtime 2>/dev/null || true
        umount "{{ vind_runtime_mount }}" 2>/dev/null || true
      args:
        executable: /bin/bash
      changed_when: true

    - name: Resolve stable runtime disk path
      ansible.builtin.command: "readlink -f {{ vind_runtime_disk_by_id }}"
      register: vind_runtime_disk_real
      changed_when: false
    
    - name: Set runtime disk and partition facts
      ansible.builtin.set_fact:
        vind_runtime_disk: "{{ vind_runtime_disk_real.stdout }}"
        vind_runtime_partition: "{{ vind_runtime_disk_real.stdout }}1"
    
    - name: Safety check runtime disk was selected by stable by-id path
      ansible.builtin.assert:
        that:
          - vind_runtime_disk_by_id is match('^/dev/disk/by-id/')
          - vind_runtime_disk is match('^/dev/sd[a-z]$')
        fail_msg: |
          Refusing to wipe disk.
    
          Use a stable /dev/disk/by-id path, not /dev/sda or /dev/sdb.
    
          Example:
          vind_runtime_disk_by_id=/dev/disk/by-id/usb-Samsung_Portable_SSD_...
    
    - name: Wipe and partition runtime disk only when explicitly requested
      ansible.builtin.shell: |
        set -eux
    
        DISK="{{ vind_runtime_disk }}"
    
        systemctl stop docker containerd 2>/dev/null || true
    
        umount /var/lib/docker 2>/dev/null || true
        umount /var/lib/containerd 2>/dev/null || true
        umount /var/lib/vind-runtime 2>/dev/null || true
        umount "{{ vind_runtime_mount }}" 2>/dev/null || true
    
        for part in $(lsblk -nrpo NAME "$DISK" | tail -n +2); do
          wipefs -a "$part" || true
        done
    
        wipefs -a "$DISK" || true
    
        parted -s "$DISK" mklabel gpt
        parted -s "$DISK" mkpart primary ext4 1MiB 100%
    
        partprobe "$DISK" || true
        udevadm settle || true
    
        PART="${DISK}1"
    
        for i in $(seq 1 30); do
          if [ -b "$PART" ]; then
            break
          fi
          sleep 1
        done
    
        test -b "$PART"
    
        mkfs.ext4 -F -L "{{ vind_runtime_label }}" "$PART"
      args:
        executable: /bin/bash
      when: wipe_vind_runtime_disk | bool
      changed_when: true

    - name: Create runtime disk mount point
      ansible.builtin.file:
        path: "{{ vind_runtime_mount }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Mount runtime disk by label
      ansible.builtin.shell: |
        set -eux

        mkdir -p "{{ vind_runtime_mount }}"

        if ! blkid -L "{{ vind_runtime_label }}" >/dev/null 2>&1; then
          echo "Could not find filesystem label {{ vind_runtime_label }}"
          echo "Run with -e wipe_vind_runtime_disk=true once to format {{ vind_runtime_disk }}"
          lsblk -f
          exit 1
        fi

        mountpoint -q "{{ vind_runtime_mount }}" || mount LABEL="{{ vind_runtime_label }}" "{{ vind_runtime_mount }}"
      args:
        executable: /bin/bash
      changed_when: true

    - name: Create Docker/containerd/vind runtime directories on SSD
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      loop:
        - "{{ docker_runtime_dir }}"
        - "{{ containerd_runtime_dir }}"
        - "{{ vind_runtime_dir }}"

    - name: Create target runtime mount directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      loop:
        - /var/lib/docker
        - /var/lib/containerd
        - /var/lib/vind-runtime

    - name: Bind mount Docker/containerd/vind runtime paths to SSD
      ansible.builtin.shell: |
        set -eux

        mountpoint -q /var/lib/docker || mount --bind "{{ docker_runtime_dir }}" /var/lib/docker
        mountpoint -q /var/lib/containerd || mount --bind "{{ containerd_runtime_dir }}" /var/lib/containerd
        mountpoint -q /var/lib/vind-runtime || mount --bind "{{ vind_runtime_dir }}" /var/lib/vind-runtime
      args:
        executable: /bin/bash
      changed_when: true

    - name: Configure Docker daemon for vCluster and KubeVirt
      ansible.builtin.copy:
        dest: /etc/docker/daemon.json
        owner: root
        group: root
        mode: "0644"
        content: |
          {
            "features": {
              "containerd-snapshotter": true
            },
            "group": "docker",
            "dns": ["8.8.8.8", "1.1.1.1"],
            "default-ulimits": {
              "nofile": {
                "Name": "nofile",
                "Soft": 1048576,
                "Hard": 1048576
              }
            }
          }

    - name: Configure host sysctl limits for KubeVirt
      ansible.builtin.copy:
        dest: /etc/sysctl.d/99-kubevirt-inotify.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          fs.inotify.max_user_instances=8192
          fs.inotify.max_user_watches=1048576
          fs.inotify.max_queued_events=65536
          fs.file-max=2097152

    - name: Apply sysctl limits
      ansible.builtin.command: sysctl --system
      changed_when: true

    - name: Start containerd
      ansible.builtin.systemd:
        name: containerd
        enabled: true
        state: started
        daemon_reload: true

    - name: Start Docker
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: restarted
        daemon_reload: true

    - name: Wait for Docker socket
      ansible.builtin.wait_for:
        path: /run/docker.sock
        state: present
        timeout: 30

    - name: Fix Docker socket group and permissions
      ansible.builtin.shell: |
        set -eux
        groupadd -f docker
        usermod -aG docker "{{ vind_user }}"
        chgrp docker /run/docker.sock
        chmod 660 /run/docker.sock
      args:
        executable: /bin/bash
      changed_when: true

    - name: Verify runtime mounts
      ansible.builtin.shell: |
        set -eux
        findmnt "{{ vind_runtime_mount }}"
        findmnt /var/lib/docker
        findmnt /var/lib/containerd
        findmnt /var/lib/vind-runtime
        df -h "{{ vind_runtime_mount }}" /var/lib/docker /var/lib/containerd /var/lib/vind-runtime
        docker info -f '{{ "{{" }} .DriverStatus {{ "}}" }}'
      args:
        executable: /bin/bash
      register: runtime_mount_verify
      changed_when: false

    - name: Show runtime mount verification
      ansible.builtin.debug:
        var: runtime_mount_verify.stdout_lines

    # - name: Create ext4-backed runtime storage for PXE live system
    #   ansible.builtin.shell: |
    #     set -eux

    #     RUNTIME_IMG="/run/vind-runtime.img"
    #     RUNTIME_MOUNT="/var/lib/vind-runtime"

    #     mkdir -p "${RUNTIME_MOUNT}"

    #     if ! findmnt -n "${RUNTIME_MOUNT}" >/dev/null 2>&1; then
    #       rm -f "${RUNTIME_IMG}"
    #       truncate -s 20G "${RUNTIME_IMG}"
    #       mkfs.ext4 -F "${RUNTIME_IMG}"
    #       mount -o loop "${RUNTIME_IMG}" "${RUNTIME_MOUNT}"
    #     fi

    #     mkdir -p "${RUNTIME_MOUNT}/docker"
    #     mkdir -p "${RUNTIME_MOUNT}/containerd"

    #     mkdir -p /var/lib/docker
    #     mkdir -p /var/lib/containerd

    #     if ! findmnt -n /var/lib/docker >/dev/null 2>&1; then
    #       mount --bind "${RUNTIME_MOUNT}/docker" /var/lib/docker
    #     fi

    #     if ! findmnt -n /var/lib/containerd >/dev/null 2>&1; then
    #       mount --bind "${RUNTIME_MOUNT}/containerd" /var/lib/containerd
    #     fi
    #   args:
    #     executable: /bin/bash
    #   changed_when: true

    - name: Configure Docker DNS
      ansible.builtin.copy:
        dest: /etc/docker/daemon.json
        mode: "0644"
        content: |
          {
            "dns": ["8.8.8.8", "1.1.1.1"]
          }

    - name: Start containerd
      ansible.builtin.systemd:
        name: containerd
        state: started
        enabled: true

    - name: Start Docker
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: Verify runtime storage is not on live overlay
      ansible.builtin.command: "findmnt -T /var/lib/containerd"
      register: containerd_mount_result
      changed_when: false

    - name: Show containerd mount
      ansible.builtin.debug:
        var: containerd_mount_result.stdout_lines

    - name: Create work directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ vind_user }}"
        group: "{{ vind_user }}"
        mode: "0755"
      loop:
        - "{{ work_dir }}"
        - "{{ backup_dir }}"
        - "{{ vind_home }}/.kube"
        - "{{ vind_home }}/.vcluster"

    - name: Fix ownership of user vcluster and kube config directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ vind_user }}"
        group: "{{ vind_user }}"
        recurse: true
      loop:
        - "{{ vind_home }}/.kube"
        - "{{ vind_home }}/.vcluster"

    - name: Remove root-owned or stale vCluster config if present
      ansible.builtin.file:
        path: "{{ vind_home }}/.vcluster/config.json"
        state: absent
      when: reset_vcluster_config | default(true) | bool

    - name: Set vCluster driver to Docker
      ansible.builtin.command: vcluster use driver docker
      become_user: "{{ vind_user }}"
      environment:
        HOME: "{{ vind_home }}"
        KUBECONFIG: "{{ vind_kubeconfig }}"
      register: vcluster_driver_result
      changed_when: "'docker' in (vcluster_driver_result.stdout | lower)"

    # - name: Delete existing test cluster before starting
    #   ansible.builtin.command: "vcluster delete {{ vind_cluster_name }} --ignore-not-found"
    #   become_user: "{{ vind_user }}"
    #   environment:
    #     HOME: "{{ vind_home }}"
    #     KUBECONFIG: "{{ vind_kubeconfig }}"
    #   register: pre_delete_result
    #   changed_when: "'deleted' in (pre_delete_result.stdout | lower)"
    #   when: cleanup_existing_cluster_first | bool

    - name: Configure host sysctl limits for KubeVirt inotify/file watchers
      ansible.builtin.copy:
        dest: /etc/sysctl.d/99-kubevirt-inotify.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          fs.inotify.max_user_instances=8192
          fs.inotify.max_user_watches=1048576
          fs.inotify.max_queued_events=65536
          fs.file-max=2097152

    - name: Apply KubeVirt sysctl limits
      ansible.builtin.command: sysctl --system
      changed_when: true

    - name: Configure Docker daemon for vCluster/KubeVirt limits
      ansible.builtin.copy:
        dest: /etc/docker/daemon.json
        owner: root
        group: root
        mode: "0644"
        content: |
          {
            "features": {
              "containerd-snapshotter": true
            },
            "group": "docker",
            "dns": ["8.8.8.8", "1.1.1.1"],
            "default-ulimits": {
              "nofile": {
                "Name": "nofile",
                "Soft": 1048576,
                "Hard": 1048576
              }
            }
          }
      register: docker_daemon_config

    # - name: Restart Docker after daemon limit changes
    #   ansible.builtin.systemd:
    #     name: docker
    #     state: restarted
    #     enabled: true
    #     daemon_reload: true
    #   when: docker_daemon_config.changed

    - name: Start Docker
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: Wait for Docker socket after restart
      ansible.builtin.wait_for:
        path: /run/docker.sock
        state: present
        timeout: 30

    - name: Fix Docker socket permissions after restart
      ansible.builtin.shell: |
        set -eux
        groupadd -f docker
        usermod -aG docker "{{ vind_user }}"
        chgrp docker /run/docker.sock
        chmod 660 /run/docker.sock
      args:
        executable: /bin/bash
      changed_when: true

    - name: Verify KubeVirt host limits
      ansible.builtin.shell: |
        set -eux
        sysctl fs.inotify.max_user_instances
        sysctl fs.inotify.max_user_watches
        sysctl fs.inotify.max_queued_events
        sysctl fs.file-max
        ulimit -n
      args:
        executable: /bin/bash
      register: kubevirt_limit_check
      changed_when: false

    - name: Show KubeVirt host limits
      ansible.builtin.debug:
        var: kubevirt_limit_check.stdout_lines

    - name: Remove old snapshot file
      ansible.builtin.file:
        path: "{{ snapshot_path }}"
        state: absent

    - name: Generate random vind cluster name
      ansible.builtin.set_fact:
        vind_cluster_name: "{{ vind_cluster_prefix }}-{{ ansible_date_time.epoch }}-{{ 9999 | random }}"

    - name: Set snapshot path for randomized cluster
      ansible.builtin.set_fact:
        snapshot_path: "{{ backup_dir }}/{{ vind_cluster_name }}.tar.gz"

    - name: Set unique test marker
      ansible.builtin.set_fact:
        snapshot_test_id: "vind-snapshot-test-{{ ansible_date_time.epoch }}"

    - name: Create vind cluster
      ansible.builtin.shell: |
        set -eux
        sg docker -c 'vcluster use driver docker'
        sg docker -c 'vcluster create {{ vind_cluster_name }} --driver docker'
      args:
        executable: /bin/bash
      become_user: "{{ vind_user }}"
      environment:
        HOME: "{{ vind_home }}"
        KUBECONFIG: "{{ vind_kubeconfig }}"
      register: create_cluster_result
      changed_when: true

    - name: Wait for cluster API to respond
      ansible.builtin.command: kubectl get nodes
      become_user: "{{ vind_user }}"
      environment:
        HOME: "{{ vind_home }}"
        KUBECONFIG: "{{ vind_kubeconfig }}"
      register: kubectl_nodes_result
      changed_when: false
      retries: 30
      delay: 5
      until: kubectl_nodes_result.rc == 0

    - name: Write stateful test application manifest
      ansible.builtin.copy:
        dest: "{{ app_manifest_path }}"
        owner: "{{ vind_user }}"
        group: "{{ vind_user }}"
        mode: "0644"
        content: |
          apiVersion: v1
          kind: Namespace
          metadata:
            name: {{ test_namespace }}
          ---
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: app-config
            namespace: {{ test_namespace }}
          data:
            APP_VERSION: "3.2.1"
            ENVIRONMENT: "production"
            SNAPSHOT_TEST_ID: "{{ snapshot_test_id }}"
          ---
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: app-storage
            namespace: {{ test_namespace }}
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 100Mi
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: {{ test_app_name }}
            namespace: {{ test_namespace }}
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: {{ test_app_name }}
            template:
              metadata:
                labels:
                  app: {{ test_app_name }}
              spec:
                containers:
                  - name: app
                    image: nginx:alpine
                    ports:
                      - containerPort: 80
                    envFrom:
                      - configMapRef:
                          name: app-config
                    volumeMounts:
                      - name: storage
                        mountPath: /data
                    command:
                      - sh
                      - -c
                      - |
                        if [ ! -f /data/app.log ]; then
                          echo "snapshot_test_id={{ snapshot_test_id }}" > /data/app.log
                          echo "created_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> /data/app.log
                          echo "persistent_data=survived_restore" >> /data/app.log
                        fi
                        nginx -g 'daemon off;'
                volumes:
                  - name: storage
                    persistentVolumeClaim:
                      claimName: app-storage
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: {{ test_app_name }}
            namespace: {{ test_namespace }}
          spec:
            selector:
              app: {{ test_app_name }}
            ports:
              - port: 80
                targetPort: 80

    - name: Deploy stateful test application
      ansible.builtin.command: "kubectl apply -f {{ app_manifest_path }}"
      become_user: "{{ vind_user }}"
      environment:
        HOME: "{{ vind_home }}"
        KUBECONFIG: "{{ vind_kubeconfig }}"
      register: app_apply_result
      changed_when: true

    - name: Wait for test deployment to become available
      ansible.builtin.command: >
        kubectl wait --for=condition=available
        deployment/{{ test_app_name }}
        -n {{ test_namespace }}
        --timeout=180s
      become_user: "{{ vind_user }}"
      environment:
        HOME: "{{ vind_home }}"
        KUBECONFIG: "{{ vind_kubeconfig }}"
      changed_when: false

    - name: Capture original PVC data
      ansible.builtin.command: >
        kubectl exec -n {{ test_namespace }}
        deploy/{{ test_app_name }}
        -- cat /data/app.log
      become_user: "{{ vind_user }}"
      environment:
        HOME: "{{ vind_home }}"
        KUBECONFIG: "{{ vind_kubeconfig }}"
      register: original_app_log
      changed_when: false

    - name: Show original PVC data
      ansible.builtin.debug:
        var: original_app_log.stdout_lines

    - name: Create local snapshot
      ansible.builtin.shell: |
        set -eux

        sg docker -c 'vcluster use driver docker'

        sg docker -c 'docker ps -a --format "{{ "{{" }}.Names{{ "}}" }}" | grep -E "{{ vind_cluster_name }}|vcluster" || true'

        sg docker -c 'vcluster list'

        sg docker -c 'vcluster snapshot create {{ vind_cluster_name }} {{ snapshot_path }}'
      args:
        executable: /bin/bash
      become_user: "{{ vind_user }}"
      environment:
        HOME: "{{ vind_home }}"
        KUBECONFIG: "{{ vind_kubeconfig }}"
      register: snapshot_create_result
      changed_when: true

    - name: Wait for snapshot file to exist
      ansible.builtin.wait_for:
        path: "{{ snapshot_path }}"
        state: present
        timeout: 300

    - name: Check snapshot file size
      ansible.builtin.stat:
        path: "{{ snapshot_path }}"
      register: snapshot_stat

    - name: Fail if snapshot file is empty
      ansible.builtin.fail:
        msg: "Snapshot file {{ snapshot_path }} was not created or is empty."
      when: not snapshot_stat.stat.exists or snapshot_stat.stat.size | int == 0

    - name: Wait 2 minutes before deleting cluster
      ansible.builtin.pause:
        seconds: "{{ wait_before_delete_seconds }}"

    - name: Delete vind cluster Docker containers directly
      ansible.builtin.shell: |
        set -eux

        sg docker -c '
          echo "Containers before delete:"
          docker ps -a --filter "name={{ vind_cluster_name }}" --format "table {{ "{{" }}.Names{{ "}}" }}\t{{ "{{" }}.Status{{ "}}" }}"

          docker ps -aq --filter "name={{ vind_cluster_name }}" | xargs -r docker rm -f

          echo "Containers after delete:"
          docker ps -a --filter "name={{ vind_cluster_name }}" --format "table {{ "{{" }}.Names{{ "}}" }}\t{{ "{{" }}.Status{{ "}}" }}"
        '
      args:
        executable: /bin/bash
      become_user: "{{ vind_user }}"
      environment:
        HOME: "{{ vind_home }}"
        KUBECONFIG: "{{ vind_kubeconfig }}"
      register: delete_cluster_result
      changed_when: true

    - name: Restore vind cluster from snapshot
      ansible.builtin.command: >
        vcluster restore {{ vind_cluster_name }} {{ snapshot_path }}
      become_user: "{{ vind_user }}"
      environment:
        HOME: "{{ vind_home }}"
        KUBECONFIG: "{{ vind_kubeconfig }}"
      register: restore_cluster_result
      changed_when: true

    - name: Wait briefly after restore
      ansible.builtin.pause:
        seconds: "{{ wait_after_restore_seconds }}"

    - name: Wait for restored cluster API to respond
      ansible.builtin.command: kubectl get nodes
      become_user: "{{ vind_user }}"
      environment:
        HOME: "{{ vind_home }}"
        KUBECONFIG: "{{ vind_kubeconfig }}"
      register: restored_nodes_result
      changed_when: false
      retries: 30
      delay: 5
      until: restored_nodes_result.rc == 0

    - name: Verify restored resources exist
      ansible.builtin.command: >
        kubectl get all,configmap,pvc -n {{ test_namespace }}
      become_user: "{{ vind_user }}"
      environment:
        HOME: "{{ vind_home }}"
        KUBECONFIG: "{{ vind_kubeconfig }}"
      register: restored_resources_result
      changed_when: false

    - name: Wait for restored deployment to become available
      ansible.builtin.command: >
        kubectl wait --for=condition=available
        deployment/{{ test_app_name }}
        -n {{ test_namespace }}
        --timeout=180s
      become_user: "{{ vind_user }}"
      environment:
        HOME: "{{ vind_home }}"
        KUBECONFIG: "{{ vind_kubeconfig }}"
      changed_when: false

    - name: Read restored PVC data
      ansible.builtin.command: >
        kubectl exec -n {{ test_namespace }}
        deploy/{{ test_app_name }}
        -- cat /data/app.log
      become_user: "{{ vind_user }}"
      environment:
        HOME: "{{ vind_home }}"
        KUBECONFIG: "{{ vind_kubeconfig }}"
      register: restored_app_log
      changed_when: false

    # - name: Fail if restored PVC data does not match original data
    #   ansible.builtin.fail:
    #     msg: |
    #       Restored PVC data does not match original data.

    #       Original:
    #       {{ original_app_log.stdout }}

    #       Restored:
    #       {{ restored_app_log.stdout }}
    #   when: restored_app_log.stdout != original_app_log.stdout

    - name: Show successful restore verification
      ansible.builtin.debug:
        msg:
          - "vind snapshot/delete/restore test completed successfully."
          - "Cluster name: {{ vind_cluster_name }}"
          - "Snapshot path: {{ snapshot_path }}"
          - "Restored resources:"
          - "{{ restored_resources_result.stdout_lines }}"
          - "Restored PVC data:"
          - "{{ restored_app_log.stdout_lines }}"

    - name: Run second ansible-pull directly
      ansible.builtin.command: >
        ansible-pull
        -U https://github.com/dejuanmcburnie/ansible-pull-test.git
        -C main
        -i localhost,
        -c local
        restore.yaml
      register: second_ansible_pull_result
      changed_when: true


