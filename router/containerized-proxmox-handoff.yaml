---
- name: Deploy two containerized Proxmox nodes with passthrough NIC handoff backups
  hosts: localhost
  connection: local
  become: true
  gather_facts: true

  vars:
    # -----------------------------
    # Containerized Proxmox
    # -----------------------------
    pve_compose_dir: /opt/containerized-proxmox
    pve_data_base: /srv/containerized-proxmox
    pve_image: ghcr.io/longqt-sea/proxmox-ve:latest

    pve_root_password: "CHANGE_ME"

    # VMID of the OPNsense VM inside BOTH nested Proxmox containers.
    # You must create/import the OPNsense VM in both pve-1 and pve-2 with this same VMID.
    opnsense_vmid: 100

    # This is the passthrough PCI device used inside the OPNsense VM config:
    # Example inside Proxmox VM config:
    #   hostpci0: 0000:03:00.0
    passthrough_pci_bdf: "0000:03:00.0"

    # The NIC must already be bound to vfio-pci on the host.
    require_passthrough_nic_vfio_bound: true

    pve_nodes:
      - name: pve-1
        hostname: pve-1
        role: primary
        web_port: 8006
        ssh_port: 2222
        spice_port: 3128
      - name: pve-2
        hostname: pve-2
        role: standby
        web_port: 8007
        ssh_port: 2223
        spice_port: 3129

    # -----------------------------
    # Backup handoff behavior
    # -----------------------------
    handoff_backup_script_path: /usr/local/sbin/containerized-proxmox-handoff-backup
    backup_cache_dir: /var/tmp/containerized-proxmox-backups
    backup_on_calendar: "*-*-* 03:15:00"

    # true = after pve-1 backup, stop pve-2 and start pve-1 again.
    # false = leave pve-2 active after backup.
    failback_after_backup: true

    # Time for OPNsense/CARP/upstream network to settle after standby starts.
    handoff_settle_seconds: 45

    # Time to wait for graceful VM shutdown before hard stop.
    opnsense_shutdown_timeout: 60

    backup_keep_local_count: 3
    backup_keep_remote_count: 14

    # -----------------------------
    # Wasabi / S3FS
    # -----------------------------
    wasabi_enabled: true
    wasabi_bucket: "CHANGE_ME_BUCKET"
    wasabi_endpoint: "https://s3.us-east-1.wasabisys.com"
    wasabi_mountpoint: /mnt/wasabi-proxmox
    wasabi_backup_prefix: containerized-proxmox
    wasabi_access_key: "CHANGE_ME_ACCESS_KEY"
    wasabi_secret_key: "CHANGE_ME_SECRET_KEY"
    s3fs_passwd_file: /etc/passwd-s3fs

    # -----------------------------
    # Optional restore
    # -----------------------------
    # This restore restores a node data root, not both nodes at once.
    # Example:
    #   -e restore_node=pve-1
    #   -e restore_backup_tarball=myhost-pve-1-20260606-031500.tar.gz
    restore_node: ""
    restore_backup_tarball: ""
    restore_confirm: false

  pre_tasks:
    - name: Fail if not Debian/Ubuntu family
      ansible.builtin.assert:
        that:
          - ansible_os_family == "Debian"
        fail_msg: "This playbook is written for Ubuntu/Debian-family hosts."

    - name: Check /dev/kvm
      ansible.builtin.stat:
        path: /dev/kvm
      register: kvm_device

    - name: Fail if /dev/kvm is missing
      ansible.builtin.assert:
        that:
          - kvm_device.stat.exists
        fail_msg: "/dev/kvm is missing. Enable Intel VT-x/AMD-V and KVM on the host."

    - name: Check /dev/vfio
      ansible.builtin.stat:
        path: /dev/vfio
      register: vfio_dir

    - name: Fail if /dev/vfio is missing
      ansible.builtin.assert:
        that:
          - vfio_dir.stat.exists
        fail_msg: "/dev/vfio is missing. Enable IOMMU and bind the passthrough NIC to vfio-pci."

    - name: Check passthrough PCI device exists
      ansible.builtin.stat:
        path: "/sys/bus/pci/devices/{{ passthrough_pci_bdf }}"
      register: pci_device

    - name: Fail if passthrough PCI device does not exist
      ansible.builtin.assert:
        that:
          - pci_device.stat.exists
        fail_msg: "PCI device {{ passthrough_pci_bdf }} was not found on this host."

    - name: Read current driver for passthrough PCI device
      ansible.builtin.command:
        cmd: "readlink -f /sys/bus/pci/devices/{{ passthrough_pci_bdf }}/driver"
      register: pci_driver
      changed_when: false
      failed_when: false

    - name: Fail if passthrough NIC is not bound to vfio-pci
      ansible.builtin.assert:
        that:
          - "'vfio-pci' in pci_driver.stdout"
        fail_msg: >-
          PCI device {{ passthrough_pci_bdf }} is not bound to vfio-pci.
          Current driver path: {{ pci_driver.stdout | default('unknown') }}.
          Bind the NIC to vfio-pci before using passthrough handoff.
      when: require_passthrough_nic_vfio_bound | bool

    - name: Validate required Wasabi variables
      ansible.builtin.assert:
        that:
          - pve_root_password != "CHANGE_ME"
          - wasabi_bucket != "CHANGE_ME_BUCKET"
          - wasabi_access_key != "CHANGE_ME_ACCESS_KEY"
          - wasabi_secret_key != "CHANGE_ME_SECRET_KEY"
        fail_msg: "Set pve_root_password, wasabi_bucket, wasabi_access_key, and wasabi_secret_key."
      when: wasabi_enabled | bool

  tasks:
    # -----------------------------
    # Docker install
    # -----------------------------
    - name: Install base packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - s3fs
          - fuse3
          - tar
          - gzip
          - rsync
          - lsof
          - pciutils
        state: present
        update_cache: true

    - name: Create Docker apt keyring directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Docker apt signing key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Set Docker apt architecture fact
      ansible.builtin.set_fact:
        docker_apt_arch: >-
          {{
            {
              'x86_64': 'amd64',
              'aarch64': 'arm64',
              'armv7l': 'armhf'
            }.get(ansible_architecture, ansible_architecture)
          }}

    - name: Add Docker apt repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={{ docker_apt_arch }} signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/ubuntu
          {{ ansible_distribution_release }}
          stable
        filename: docker
        state: present
        update_cache: true

    - name: Install Docker Engine
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Enable and start Docker
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    # -----------------------------
    # Directories
    # -----------------------------
    - name: Create compose and backup directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      loop:
        - "{{ pve_compose_dir }}"
        - "{{ pve_data_base }}"
        - "{{ backup_cache_dir }}"

    - name: Ensure per-node directory structure exists
      ansible.builtin.file:
        path: "{{ pve_data_base }}/{{ item.0 }}/{{ item.1 }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      loop: "{{ pve_nodes | map(attribute='name') | product([
          'var-lib-vz',
          'var-lib-vz/dump',
          'var-lib-vz/images',
          'var-lib-vz/template',
          'var-lib-vz/template/iso',
          'var-lib-pve-cluster',
          'var-lib-pve-manager',
          'etc-network'
        ]) | list }}"

    # -----------------------------
    # Wasabi S3FS
    # -----------------------------
    - name: Create Wasabi mountpoint
      ansible.builtin.file:
        path: "{{ wasabi_mountpoint }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      when: wasabi_enabled | bool

    - name: Allow FUSE allow_other
      ansible.builtin.lineinfile:
        path: /etc/fuse.conf
        regexp: '^#?user_allow_other'
        line: user_allow_other
        create: true
        mode: "0644"
      when: wasabi_enabled | bool

    - name: Write s3fs credential file
      ansible.builtin.copy:
        dest: "{{ s3fs_passwd_file }}"
        content: "{{ wasabi_access_key }}:{{ wasabi_secret_key }}\n"
        owner: root
        group: root
        mode: "0600"
      no_log: true
      when: wasabi_enabled | bool

    - name: Add Wasabi S3FS fstab entry
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: '^{{ wasabi_bucket }}\s+{{ wasabi_mountpoint | regex_escape }}\s+fuse\.s3fs\s+'
        line: >-
          {{ wasabi_bucket }} {{ wasabi_mountpoint }} fuse.s3fs
          _netdev,allow_other,use_path_request_style,url={{ wasabi_endpoint }},
          passwd_file={{ s3fs_passwd_file }},uid=0,gid=0,mp_umask=0022,
          retries=5,connect_timeout=10,readwrite_timeout=120 0 0
        create: true
        mode: "0644"
      when: wasabi_enabled | bool

    - name: Mount Wasabi bucket
      ansible.builtin.command:
        cmd: "mount {{ wasabi_mountpoint }}"
      register: wasabi_mount_cmd
      changed_when: wasabi_mount_cmd.rc == 0
      failed_when:
        - wasabi_mount_cmd.rc != 0
        - "'already mounted' not in wasabi_mount_cmd.stderr"
      when: wasabi_enabled | bool

    - name: Create Wasabi backup prefix directory
      ansible.builtin.file:
        path: "{{ wasabi_mountpoint }}/{{ wasabi_backup_prefix }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      when: wasabi_enabled | bool

    # -----------------------------
    # Docker Compose
    # -----------------------------
    - name: Write Docker Compose file for two Proxmox containers
      ansible.builtin.copy:
        dest: "{{ pve_compose_dir }}/compose.yml"
        owner: root
        group: root
        mode: "0600"
        content: |
          services:
          {% for node in pve_nodes %}
            {{ node.name }}:
              image: {{ pve_image }}
              container_name: {{ node.name }}
              hostname: {{ node.hostname }}
              restart: "no"
              stdin_open: true
              tty: true
              privileged: true
              cgroup: private
              cap_add:
                - ALL
              security_opt:
                - seccomp=unconfined
                - apparmor=unconfined
                - systempaths=unconfined
              environment:
                PASSWORD: "{{ pve_root_password }}"
              ports:
                - "{{ node.ssh_port }}:22"
                - "{{ node.spice_port }}:3128"
                - "{{ node.web_port }}:8006"
              devices:
                - /dev/kvm:/dev/kvm
                - /dev/net/tun:/dev/net/tun
              volumes:
                - /usr/lib/modules:/usr/lib/modules:ro
                - /lib/modules:/lib/modules:ro
                - /dev/vfio:/dev/vfio
                - /sys:/sys
                - {{ pve_data_base }}/{{ node.name }}/var-lib-vz:/var/lib/vz
                - {{ pve_data_base }}/{{ node.name }}/var-lib-pve-cluster:/var/lib/pve-cluster
                - {{ pve_data_base }}/{{ node.name }}/var-lib-pve-manager:/var/lib/pve-manager
                - {{ pve_data_base }}/{{ node.name }}/etc-network:/etc/network
          {% endfor %}

    - name: Pull Proxmox image
      ansible.builtin.command:
        cmd: "docker compose -f {{ pve_compose_dir }}/compose.yml pull"
      changed_when: true

    # -----------------------------
    # Optional restore
    # -----------------------------
    - name: Validate restore confirmation
      ansible.builtin.assert:
        that:
          - restore_confirm | bool
          - restore_node in (pve_nodes | map(attribute='name') | list)
        fail_msg: >-
          To restore, set restore_node to pve-1 or pve-2 and set restore_confirm=true.
      when: restore_backup_tarball | length > 0

    - name: Set restore source path
      ansible.builtin.set_fact:
        restore_source_path: >-
          {{
            restore_backup_tarball
            if (restore_backup_tarball is match('^/'))
            else wasabi_mountpoint ~ '/' ~ wasabi_backup_prefix ~ '/' ~ restore_backup_tarball
          }}
      when: restore_backup_tarball | length > 0

    - name: Stop both Proxmox containers before restore
      ansible.builtin.command:
        cmd: "docker compose -f {{ pve_compose_dir }}/compose.yml stop pve-1 pve-2"
      failed_when: false
      changed_when: true
      when: restore_backup_tarball | length > 0

    - name: Set restore timestamp
      ansible.builtin.set_fact:
        restore_timestamp: "{{ lookup('pipe', 'date +%Y%m%d-%H%M%S') }}"
      when: restore_backup_tarball | length > 0

    - name: Move existing node data aside before restore
      ansible.builtin.command:
        cmd: >-
          mv {{ (pve_data_base ~ '/' ~ restore_node) | quote }}
          {{ (pve_data_base ~ '/' ~ restore_node ~ '.pre-restore-' ~ restore_timestamp) | quote }}
      failed_when: false
      changed_when: true
      when: restore_backup_tarball | length > 0

    - name: Extract selected node backup tarball
      ansible.builtin.unarchive:
        src: "{{ restore_source_path }}"
        dest: "{{ pve_data_base }}"
        remote_src: true
        extra_opts:
          - --numeric-owner
      when: restore_backup_tarball | length > 0

    # -----------------------------
    # Handoff backup script
    # -----------------------------
    - name: Install handoff backup script
      ansible.builtin.copy:
        dest: "{{ handoff_backup_script_path }}"
        owner: root
        group: root
        mode: "0750"
        content: |
          #!/usr/bin/env bash
          set -euo pipefail

          COMPOSE_FILE="{{ pve_compose_dir }}/compose.yml"
          DATA_BASE="{{ pve_data_base }}"

          PRIMARY="pve-1"
          STANDBY="pve-2"
          VMID="{{ opnsense_vmid }}"

          WASABI_MOUNT="{{ wasabi_mountpoint }}"
          REMOTE_DIR="{{ wasabi_mountpoint }}/{{ wasabi_backup_prefix }}"
          CACHE_DIR="{{ backup_cache_dir }}"

          KEEP_LOCAL="{{ backup_keep_local_count }}"
          KEEP_REMOTE="{{ backup_keep_remote_count }}"
          FAILBACK="{{ failback_after_backup | lower }}"
          SETTLE_SECONDS="{{ handoff_settle_seconds }}"
          SHUTDOWN_TIMEOUT="{{ opnsense_shutdown_timeout }}"

          HOST="$(hostname -s)"
          TS="$(date +%Y%m%d-%H%M%S)"

          log() {
            echo "[$(date --iso-8601=seconds)] $*"
          }

          compose_up() {
            local svc="$1"
            log "Starting container $svc"
            docker compose -f "$COMPOSE_FILE" up -d "$svc"
          }

          compose_stop() {
            local svc="$1"
            log "Stopping container $svc"
            docker compose -f "$COMPOSE_FILE" stop "$svc" || true
          }

          wait_for_container_exec() {
            local svc="$1"
            log "Waiting for $svc to accept docker exec"
            for i in $(seq 1 90); do
              if docker exec "$svc" bash -lc "true" >/dev/null 2>&1; then
                return 0
              fi
              sleep 2
            done
            log "ERROR: $svc did not become exec-ready"
            return 1
          }

          wait_for_qm() {
            local svc="$1"
            log "Waiting for qm inside $svc"
            for i in $(seq 1 90); do
              if docker exec "$svc" bash -lc "command -v qm >/dev/null && qm status $VMID >/dev/null 2>&1"; then
                return 0
              fi
              sleep 2
            done
            log "ERROR: qm or VMID $VMID not ready inside $svc"
            return 1
          }

          vm_status() {
            local svc="$1"
            docker exec "$svc" bash -lc "qm status $VMID 2>/dev/null | awk '{print \$2}'" || true
          }

          stop_vm() {
            local svc="$1"

            if ! docker ps --format '{{ "{{" }}.Names{{ "}}" }}' | grep -qx "$svc"; then
              log "$svc is not running; VM stop skipped"
              return 0
            fi

            wait_for_container_exec "$svc" || return 0

            if ! docker exec "$svc" bash -lc "qm status $VMID >/dev/null 2>&1"; then
              log "VMID $VMID does not exist or qm is not ready inside $svc; VM stop skipped"
              return 0
            fi

            local status
            status="$(vm_status "$svc")"
            log "$svc VM $VMID current status: ${status:-unknown}"

            if [[ "$status" == "running" ]]; then
              log "Gracefully shutting down VM $VMID inside $svc"
              docker exec "$svc" bash -lc "qm shutdown $VMID --timeout $SHUTDOWN_TIMEOUT" || true

              status="$(vm_status "$svc")"
              if [[ "$status" == "running" ]]; then
                log "VM $VMID still running inside $svc; forcing stop"
                docker exec "$svc" bash -lc "qm stop $VMID" || true
              fi
            fi
          }

          start_vm() {
            local svc="$1"

            wait_for_container_exec "$svc"
            wait_for_qm "$svc"

            local status
            status="$(vm_status "$svc")"
            log "$svc VM $VMID current status: ${status:-unknown}"

            if [[ "$status" != "running" ]]; then
              log "Starting VM $VMID inside $svc"
              docker exec "$svc" bash -lc "qm start $VMID"
            else
              log "VM $VMID inside $svc is already running"
            fi
          }

          ensure_wasabi_mounted() {
            if ! mountpoint -q "$WASABI_MOUNT"; then
              log "Mounting Wasabi mountpoint $WASABI_MOUNT"
              mount "$WASABI_MOUNT"
            fi
            mkdir -p "$REMOTE_DIR"
          }

          backup_node_data() {
            local node="$1"
            local source_dir="$DATA_BASE/$node"
            local backup_name="${HOST}-${node}-${TS}.tar.gz"
            local tmp_file="$CACHE_DIR/${backup_name}.partial"
            local final_file="$CACHE_DIR/${backup_name}"

            if [[ ! -d "$source_dir" ]]; then
              log "ERROR: source directory missing: $source_dir"
              exit 1
            fi

            mkdir -p "$CACHE_DIR"

            log "Creating backup for $node from $source_dir"
            tar --xattrs --acls --numeric-owner -czf "$tmp_file" -C "$DATA_BASE" "$node"
            mv "$tmp_file" "$final_file"

            log "Copying backup to Wasabi: $REMOTE_DIR/$backup_name"
            cp "$final_file" "$REMOTE_DIR/$backup_name"
            sync

            log "Backup complete: $REMOTE_DIR/$backup_name"
          }

          apply_retention() {
            log "Applying local retention: keep $KEEP_LOCAL"
            ls -1t "$CACHE_DIR"/*.tar.gz 2>/dev/null \
              | tail -n +"$((KEEP_LOCAL + 1))" \
              | xargs -r rm -f

            log "Applying remote retention: keep $KEEP_REMOTE"
            ls -1t "$REMOTE_DIR"/*.tar.gz 2>/dev/null \
              | tail -n +"$((KEEP_REMOTE + 1))" \
              | xargs -r rm -f
          }

          on_error() {
            local rc="$1"
            log "ERROR: handoff backup failed with exit code $rc"
            log "Leaving whichever firewall side is currently active untouched for safety."
            exit "$rc"
          }

          trap 'on_error $?' ERR

          log "Starting passthrough NIC handoff backup"
          ensure_wasabi_mounted

          log "Step 1: stop OPNsense VM inside primary"
          stop_vm "$PRIMARY"

          log "Step 2: stop primary Proxmox container to release VFIO passthrough device"
          compose_stop "$PRIMARY"

          log "Step 3: start standby Proxmox container"
          compose_up "$STANDBY"

          log "Step 4: start OPNsense VM inside standby"
          start_vm "$STANDBY"

          log "Step 5: wait ${SETTLE_SECONDS}s for firewall/network to settle"
          sleep "$SETTLE_SECONDS"

          log "Step 6: backup primary node data while standby owns passthrough NIC"
          backup_node_data "$PRIMARY"

          apply_retention

          if [[ "$FAILBACK" == "true" ]]; then
            log "Step 7: failback requested; stopping standby VM"
            stop_vm "$STANDBY"

            log "Step 8: stopping standby container to release VFIO passthrough device"
            compose_stop "$STANDBY"

            log "Step 9: starting primary container"
            compose_up "$PRIMARY"

            log "Step 10: starting OPNsense VM inside primary"
            start_vm "$PRIMARY"

            log "Step 11: wait ${SETTLE_SECONDS}s after failback"
            sleep "$SETTLE_SECONDS"

            log "Failback complete; primary is active again"
          else
            log "Failback disabled; standby remains active and primary remains stopped"
          fi

          log "Passthrough NIC handoff backup finished successfully"

    - name: Install handoff backup systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/containerized-proxmox-handoff-backup.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Containerized Proxmox passthrough NIC handoff backup
          Requires=docker.service
          After=docker.service network-online.target
          Wants=network-online.target

          [Service]
          Type=oneshot
          ExecStart={{ handoff_backup_script_path }}

    - name: Install handoff backup systemd timer
      ansible.builtin.copy:
        dest: /etc/systemd/system/containerized-proxmox-handoff-backup.timer
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Run containerized Proxmox passthrough NIC handoff backup

          [Timer]
          OnCalendar={{ backup_on_calendar }}
          Persistent=true

          [Install]
          WantedBy=timers.target

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable backup timer
      ansible.builtin.systemd:
        name: containerized-proxmox-handoff-backup.timer
        enabled: true
        state: started

    # -----------------------------
    # Start primary only
    # -----------------------------
    - name: Ensure standby container is stopped by default
      ansible.builtin.command:
        cmd: "docker compose -f {{ pve_compose_dir }}/compose.yml stop pve-2"
      failed_when: false
      changed_when: true

    - name: Start primary Proxmox container
      ansible.builtin.command:
        cmd: "docker compose -f {{ pve_compose_dir }}/compose.yml up -d pve-1"
      changed_when: true

    - name: Show deployment details
      ansible.builtin.debug:
        msg:
          - "Primary Proxmox: https://{{ ansible_default_ipv4.address | default('HOST_IP') }}:8006/"
          - "Standby Proxmox: https://{{ ansible_default_ipv4.address | default('HOST_IP') }}:8007/"
          - "Primary container: pve-1"
          - "Standby container: pve-2"
          - "OPNsense VMID expected in both containers: {{ opnsense_vmid }}"
          - "Passthrough PCI device expected in both OPNsense VM configs: {{ passthrough_pci_bdf }}"
          - "Manual handoff backup: sudo {{ handoff_backup_script_path }}"
          - "Timer: systemctl list-timers containerized-proxmox-handoff-backup.timer"
