---
- name: Install dependencies for vind cluster creation
  hosts: localhost
  connection: local
  become: true
  gather_facts: true

  vars:
    vind_user: user

    # Pin these as needed
    kubectl_version: "v1.34.0"
    vcluster_version: "latest"

    vind_home: "/home/{{ vind_user }}"
    vind_kubeconfig_dir: "{{ vind_home }}/.kube"

  tasks:
    - name: Clone or update vCluster inventory repo
      ansible.builtin.git:
        repo: "{{ vcluster_inventory_repo_url }}"
        dest: "{{ vcluster_inventory_repo_dir }}"
        version: "{{ vcluster_inventory_repo_branch }}"
        update: true
        accept_hostkey: true
        key_file: "{{ github_ssh_key_path }}"
      environment:
        GIT_SSH_COMMAND: "ssh -i {{ github_ssh_key_path }} -o IdentitiesOnly=yes"
      when: restore_clusters_from_inventory | bool

    - name: Set host inventory file path
      ansible.builtin.set_fact:
        vcluster_inventory_host_file: "{{ vcluster_inventory_repo_dir }}/{{ vcluster_inventory_subdir }}/{{ cluster_inventory_host_key }}.txt"

    - name: Check if host inventory file exists
      ansible.builtin.stat:
        path: "{{ vcluster_inventory_host_file }}"
      register: vcluster_inventory_host_file_stat
      when: restore_clusters_from_inventory | bool

    - name: Read vCluster names from host inventory file
      ansible.builtin.shell: |
        set -e

        FILE="{{ vcluster_inventory_host_file }}"

        if [ ! -f "$FILE" ]; then
          exit 0
        fi

        awk -F= '
          /^[[:space:]]*#/ { next }
          /^[[:space:]]*$/ { next }

          # Current key=value format:
          # vcluster_name=vind-lb-prod-cattle-1-1780284567-4821
          /^vcluster_name=/ {
            print $2
            next
          }

          # Optional multi-value format:
          # vcluster_names=vind-a,vind-b,vind-c
          /^vcluster_names=/ {
            gsub(/,/, "\n", $2)
            print $2
            next
          }

          # Legacy format: one cluster name per line
          /^[a-z0-9]([-a-z0-9]*[a-z0-9])?$/ {
            print $0
            next
          }
        ' "$FILE" \
          | tr ',' '\n' \
          | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' \
          | grep -E '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$' \
          | sort -u
      args:
        executable: /bin/bash
      register: previous_vcluster_names_raw
      changed_when: false
      when:
        - restore_clusters_from_inventory | bool
        - vcluster_inventory_host_file_stat.stat.exists | default(false)

    - name: Set previous vCluster names fact
      ansible.builtin.set_fact:
        previous_vcluster_names: "{{ previous_vcluster_names_raw.stdout_lines | default([]) }}"
      when: restore_clusters_from_inventory | bool

    - name: Show vCluster names found in inventory file
      ansible.builtin.debug:
        msg:
          - "Host inventory file: {{ vcluster_inventory_host_file }}"
          - "Previous vClusters: {{ previous_vcluster_names | default([]) }}"
      when: restore_clusters_from_inventory | bool

    - name: Find latest snapshot for each previous vCluster
      ansible.builtin.shell: |
        set -e

        CLUSTER="{{ item }}"

        ls -1t "{{ backup_dir }}/${CLUSTER}"*.tar.gz 2>/dev/null | head -n 1 || true
      args:
        executable: /bin/bash
      loop: "{{ previous_vcluster_names | default([]) }}"
      register: previous_vcluster_latest_snapshots
      changed_when: false
      when:
        - restore_clusters_from_inventory | bool
        - previous_vcluster_names | default([]) | length > 0

    - name: Show latest snapshot lookup results
      ansible.builtin.debug:
        msg: "Cluster={{ item.item }} LatestSnapshot={{ item.stdout | default('none') }}"
      loop: "{{ previous_vcluster_latest_snapshots.results | default([]) }}"
      when: restore_clusters_from_inventory | bool

    - name: Restore previous vClusters from latest snapshots
      ansible.builtin.shell: |
        set -eux

        CLUSTER="{{ item.item }}"
        SNAPSHOT="{{ item.stdout | trim }}"

        sg docker -c 'vcluster use driver docker'

        # Remove any existing Docker containers for this cluster before restore.
        sg docker -c "docker ps -aq --filter name=${CLUSTER} | xargs -r docker rm -f"

        # Restore the cluster from its latest snapshot.
        sg docker -c "vcluster restore ${CLUSTER} ${SNAPSHOT}"
      args:
        executable: /bin/bash
      become_user: "{{ vind_user }}"
      environment:
        HOME: "{{ vind_home }}"
        KUBECONFIG: "{{ vind_kubeconfig }}"
      loop: "{{ previous_vcluster_latest_snapshots.results | default([]) }}"
      loop_control:
        label: "{{ item.item }}"
      register: restored_previous_vclusters
      changed_when: true
      when:
        - restore_clusters_from_inventory | bool
        - item.stdout | default('') | trim | length > 0

    - name: Connect to each restored previous vCluster and verify nodes
      ansible.builtin.shell: |
        set -eux

        CLUSTER="{{ item.item.item }}"

        sg docker -c "vcluster connect ${CLUSTER} --driver docker -- kubectl get nodes -o wide"
      args:
        executable: /bin/bash
      become_user: "{{ vind_user }}"
      environment:
        HOME: "{{ vind_home }}"
        KUBECONFIG: "{{ vind_kubeconfig }}"
      loop: "{{ restored_previous_vclusters.results | default([]) }}"
      loop_control:
        label: "{{ item.item.item | default('unknown') }}"
      register: restored_previous_vcluster_nodes
      changed_when: false
      when:
        - restore_clusters_from_inventory | bool
        - item is not skipped
