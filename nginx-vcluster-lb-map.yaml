---
- name: Map vCluster LoadBalancer services into host Nginx
  hosts: localhost
  connection: local
  become: true
  gather_facts: true

  vars:
    vind_user: "user"
    vind_home: "/home/{{ vind_user }}"
    vind_kubeconfig: "{{ vind_home }}/.kube/config"

    nginx_listen_port: 8088
    nginx_vcluster_conf: "/etc/nginx/conf.d/vcluster-loadbalancers.conf"
    nginx_vcluster_index_dir: "/var/www/vcluster-loadbalancers"
    nginx_vcluster_index_file: "{{ nginx_vcluster_index_dir }}/index.html"

  tasks:
    - name: Install required packages
      ansible.builtin.apt:
        name:
          - nginx
          - python3
          - docker.io
        state: present
        update_cache: true

    - name: Ensure Docker is running
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    - name: Ensure nginx is enabled
      ansible.builtin.systemd:
        name: nginx
        enabled: true
        state: started

    - name: Ensure Docker socket allows docker group
      ansible.builtin.shell: |
        set -eux
        groupadd -f docker
        usermod -aG docker "{{ vind_user }}"
        chgrp docker /run/docker.sock
        chmod 660 /run/docker.sock
      args:
        executable: /bin/bash
      changed_when: true

    - name: Discover Docker-driver vClusters from Docker containers
      ansible.builtin.shell: |
        set -euo pipefail

        docker ps -a --format '{{ "{{" }}.Names{{ "}}" }}' \
          | sed -n 's/^vcluster\.cp\.//p' \
          | sort -u
      args:
        executable: /bin/bash
      register: discovered_vclusters_raw
      changed_when: false

    - name: Set discovered vCluster list
      ansible.builtin.set_fact:
        discovered_vclusters: "{{ discovered_vclusters_raw.stdout_lines | default([]) }}"

    - name: Show discovered vClusters
      ansible.builtin.debug:
        var: discovered_vclusters

    - name: Query LoadBalancer services from every vCluster
      ansible.builtin.shell: |
        set -euo pipefail

        CLUSTER="{{ item }}"

        sg docker -c "vcluster connect ${CLUSTER} --driver docker -- kubectl get svc -A -o json" \
          | python3 -c '
        import json, sys

        cluster = "'"${CLUSTER}"'"
        data = json.load(sys.stdin)

        for svc in data.get("items", []):
            spec = svc.get("spec", {})
            if spec.get("type") != "LoadBalancer":
                continue

            status = svc.get("status", {}).get("loadBalancer", {})
            ingress = status.get("ingress", [])

            if not ingress:
                continue

            target = ingress[0].get("ip") or ingress[0].get("hostname") or ""
            if not target:
                continue

            namespace = svc.get("metadata", {}).get("namespace", "")
            name = svc.get("metadata", {}).get("name", "")

            for port in spec.get("ports", []):
                service_port = port.get("port", "")
                target_port = port.get("targetPort", "")
                node_port = port.get("nodePort", "")
                protocol = port.get("protocol", "TCP")

                if str(protocol).upper() != "TCP":
                    continue

                print("|".join([
                    cluster,
                    namespace,
                    name,
                    str(target),
                    str(service_port),
                    str(target_port),
                    str(node_port),
                    str(protocol),
                ]))
        '
      args:
        executable: /bin/bash
      become_user: "{{ vind_user }}"
      environment:
        HOME: "{{ vind_home }}"
        KUBECONFIG: "{{ vind_kubeconfig }}"
      loop: "{{ discovered_vclusters }}"
      register: lb_query_results
      changed_when: false
      failed_when: false

    - name: Build LoadBalancer mapping list
      ansible.builtin.set_fact:
        lb_mappings: >-
          {{
            lb_query_results.results
            | default([])
            | map(attribute='stdout_lines')
            | list
            | flatten
            | select('length')
            | list
          }}

    - name: Show discovered LoadBalancer mappings
      ansible.builtin.debug:
        var: lb_mappings

    - name: Create Nginx index directory
      ansible.builtin.file:
        path: "{{ nginx_vcluster_index_dir }}"
        state: directory
        owner: www-data
        group: www-data
        mode: "0755"

    - name: Write Nginx vCluster LoadBalancer config
      ansible.builtin.copy:
        dest: "{{ nginx_vcluster_conf }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          # Generated by Ansible. Do not edit manually.
          #
          # vCluster LoadBalancer reverse proxy map.

          server {
              listen {{ nginx_listen_port }};
              server_name _;

              access_log /var/log/nginx/vcluster-loadbalancers-access.log;
              error_log  /var/log/nginx/vcluster-loadbalancers-error.log;

              location = / {
                  root {{ nginx_vcluster_index_dir }};
                  index index.html;
              }

          {% for line in lb_mappings %}
          {% set p = line.split('|') %}
          {% set cluster = p[0] %}
          {% set namespace = p[1] %}
          {% set svc = p[2] %}
          {% set target = p[3] %}
          {% set port = p[4] %}
              location /{{ cluster }}/{{ namespace }}/{{ svc }}/{{ port }}/ {
                  proxy_pass http://{{ target }}:{{ port }}/;
                  proxy_http_version 1.1;

                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_set_header X-VCluster "{{ cluster }}";
                  proxy_set_header X-Kubernetes-Namespace "{{ namespace }}";
                  proxy_set_header X-Kubernetes-Service "{{ svc }}";

                  proxy_connect_timeout 10s;
                  proxy_send_timeout 60s;
                  proxy_read_timeout 60s;
              }

          {% endfor %}
          }
      notify: Reload nginx

    - name: Write Nginx LoadBalancer index page
      ansible.builtin.copy:
        dest: "{{ nginx_vcluster_index_file }}"
        owner: www-data
        group: www-data
        mode: "0644"
        content: |
          <!doctype html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>vCluster LoadBalancer Map</title>
            <style>
              body { font-family: sans-serif; margin: 2rem; }
              table { border-collapse: collapse; width: 100%; }
              th, td { border: 1px solid #ccc; padding: 0.5rem; text-align: left; }
              th { background: #eee; }
              code { background: #eee; padding: 0.1rem 0.25rem; }
            </style>
          </head>
          <body>
            <h1>vCluster LoadBalancer Map</h1>
            <p>Generated on {{ ansible_date_time.iso8601 }}</p>

            {% if lb_mappings | length == 0 %}
            <p>No LoadBalancer services with an external IP or hostname were found.</p>
            {% else %}
            <table>
              <thead>
                <tr>
                  <th>Cluster</th>
                  <th>Namespace</th>
                  <th>Service</th>
                  <th>External Target</th>
                  <th>Port</th>
                  <th>Host Proxy URL</th>
                </tr>
              </thead>
              <tbody>
              {% for line in lb_mappings %}
              {% set p = line.split('|') %}
              {% set cluster = p[0] %}
              {% set namespace = p[1] %}
              {% set svc = p[2] %}
              {% set target = p[3] %}
              {% set port = p[4] %}
                <tr>
                  <td><code>{{ cluster }}</code></td>
                  <td><code>{{ namespace }}</code></td>
                  <td><code>{{ svc }}</code></td>
                  <td><code>{{ target }}</code></td>
                  <td><code>{{ port }}</code></td>
                  <td>
                    <a href="/{{ cluster }}/{{ namespace }}/{{ svc }}/{{ port }}/">
                      /{{ cluster }}/{{ namespace }}/{{ svc }}/{{ port }}/
                    </a>
                  </td>
                </tr>
              {% endfor %}
              </tbody>
            </table>
            {% endif %}
          </body>
          </html>
      notify: Reload nginx

    - name: Test Nginx config
      ansible.builtin.command: nginx -t
      changed_when: false

    - name: Ensure Nginx is running
      ansible.builtin.systemd:
        name: nginx
        state: started
        enabled: true

    - name: Show access URL
      ansible.builtin.debug:
        msg:
          - "Nginx vCluster LoadBalancer map is listening on port {{ nginx_listen_port }}."
          - "Open: http://{{ ansible_default_ipv4.address | default(ansible_hostname) }}:{{ nginx_listen_port }}/"

  handlers:
    - name: Reload nginx
      ansible.builtin.systemd:
        name: nginx
        state: reloaded
