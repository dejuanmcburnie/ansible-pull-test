---
- name: Map all vind/vCluster LoadBalancer external IP services through host Nginx TCP ports
  hosts: localhost
  connection: local
  become: true
  gather_facts: true

  vars:
    vind_user: "user"
    vind_home: "/home/{{ vind_user }}"
    vind_kubeconfig: "{{ vind_home }}/.kube/config"

    # Bind Nginx only to host private IP by default.
    nginx_bind_ip: "{{ ansible_default_ipv4.address }}"

    # User requested random ports between 30000 and 40000.
    # Note: 30000-32767 can overlap Kubernetes NodePort range.
    nginx_random_port_min: 30000
    nginx_random_port_max: 40000

    nginx_stream_conf_dir: "/etc/nginx/stream-conf.d"
    nginx_stream_conf: "{{ nginx_stream_conf_dir }}/vcluster-loadbalancers.stream.conf"

    nginx_vcluster_index_dir: "/var/www/vcluster-loadbalancers"
    nginx_vcluster_index_file: "{{ nginx_vcluster_index_dir }}/index.html"
    nginx_vcluster_mapping_json: "{{ nginx_vcluster_index_dir }}/mappings.json"

  tasks:
    - name: Install required packages
      ansible.builtin.apt:
        name:
          - nginx
          - libnginx-mod-stream
          - python3
          - docker.io
          - curl
        state: present
        update_cache: true

    - name: Ensure Docker is running
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    - name: Ensure Nginx is enabled
      ansible.builtin.systemd:
        name: nginx
        enabled: true
        state: started

    - name: Ensure Docker socket allows docker group
      ansible.builtin.shell: |
        set -eux
        groupadd -f docker
        usermod -aG docker "{{ vind_user }}"
        chgrp docker /run/docker.sock
        chmod 660 /run/docker.sock
      args:
        executable: /bin/bash
      changed_when: true

    - name: Ensure Nginx stream config directory exists
      ansible.builtin.file:
        path: "{{ nginx_stream_conf_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Ensure top-level stream include exists in nginx.conf
      ansible.builtin.lineinfile:
        path: /etc/nginx/nginx.conf
        line: "include {{ nginx_stream_conf_dir }}/*.conf;"
        insertbefore: "^http\\s*\\{"
        state: present
        backup: true

    - name: Discover Docker-driver vClusters from Docker containers
      ansible.builtin.shell: |
        set -euo pipefail

        docker ps -a --format '{{ "{{" }}.Names{{ "}}" }}' \
          | sed -n 's/^vcluster\.cp\.//p' \
          | sort -u
      args:
        executable: /bin/bash
      register: discovered_vclusters_raw
      changed_when: false

    - name: Set discovered vCluster list
      ansible.builtin.set_fact:
        discovered_vclusters: "{{ discovered_vclusters_raw.stdout_lines | default([]) }}"

    - name: Show discovered vClusters
      ansible.builtin.debug:
        var: discovered_vclusters

    - name: Query LoadBalancer services from every vCluster
      ansible.builtin.shell: |
        set -euo pipefail

        CLUSTER="{{ item }}"

        sg docker -c "vcluster connect ${CLUSTER} --driver docker -- kubectl get svc -A -o json" \
          | python3 -c '
        import json
        import sys

        cluster = "'"${CLUSTER}"'"
        data = json.load(sys.stdin)

        for svc in data.get("items", []):
            spec = svc.get("spec", {})
            if spec.get("type") != "LoadBalancer":
                continue

            ingress = svc.get("status", {}).get("loadBalancer", {}).get("ingress", [])
            if not ingress:
                continue

            # User asked for services with LoadBalancer external IP.
            external_ip = ingress[0].get("ip", "") or ""
            if not external_ip:
                continue

            namespace = svc.get("metadata", {}).get("namespace", "")
            name = svc.get("metadata", {}).get("name", "")

            for port in spec.get("ports", []):
                protocol = str(port.get("protocol", "TCP")).upper()
                if protocol != "TCP":
                    continue

                service_port = str(port.get("port", ""))
                target_port = str(port.get("targetPort", ""))
                node_port = str(port.get("nodePort", ""))

                if not service_port:
                    continue

                print("|".join([
                    cluster,
                    namespace,
                    name,
                    external_ip,
                    service_port,
                    target_port,
                    node_port,
                    protocol,
                ]))
        '
      args:
        executable: /bin/bash
      become_user: "{{ vind_user }}"
      environment:
        HOME: "{{ vind_home }}"
        KUBECONFIG: "{{ vind_kubeconfig }}"
      loop: "{{ discovered_vclusters }}"
      register: lb_query_results
      changed_when: false
      failed_when: false

    - name: Build raw LoadBalancer mapping list
      ansible.builtin.set_fact:
        lb_mappings_raw: >-
          {{
            lb_query_results.results
            | default([])
            | map(attribute='stdout_lines')
            | list
            | flatten
            | select('length')
            | list
          }}

    - name: Generate stable random host ports for LoadBalancer mappings
      ansible.builtin.shell: |
        set -euo pipefail

        python3 <<'PY'
        import hashlib
        import json
        import socket
        import subprocess

        bind_ip = "{{ nginx_bind_ip }}"
        port_min = int("{{ nginx_random_port_min }}")
        port_max = int("{{ nginx_random_port_max }}")

        raw = {{ lb_mappings_raw | to_json }}

        # Ports already listening on the host. Avoid assigning new proxy ports to them.
        used_ports = set()
        try:
            out = subprocess.check_output(["ss", "-lntH"], text=True)
            for line in out.splitlines():
                parts = line.split()
                if len(parts) >= 4:
                    local = parts[3]
                    if ":" in local:
                        p = local.rsplit(":", 1)[-1]
                        if p.isdigit():
                            used_ports.add(int(p))
        except Exception:
            pass

        assigned_ports = set()
        mappings = []

        for line in sorted(set(raw)):
            cluster, namespace, svc, external_ip, service_port, target_port, node_port, protocol = line.split("|")

            key = f"{cluster}|{namespace}|{svc}|{external_ip}|{service_port}"
            digest = hashlib.sha256(key.encode()).hexdigest()
            span = port_max - port_min + 1
            candidate = port_min + (int(digest[:8], 16) % span)

            # Resolve collisions deterministically.
            selected = None
            for offset in range(span):
                port = port_min + ((candidate - port_min + offset) % span)
                if port not in used_ports and port not in assigned_ports:
                    selected = port
                    assigned_ports.add(port)
                    break

            if selected is None:
                raise SystemExit(f"No available ports in range {port_min}-{port_max}")

            mappings.append({
                "cluster": cluster,
                "namespace": namespace,
                "service": svc,
                "external_ip": external_ip,
                "service_port": int(service_port),
                "target_port": target_port,
                "node_port": node_port,
                "protocol": protocol,
                "host_ip": bind_ip,
                "host_port": selected,
                "proxy_url": f"{bind_ip}:{selected}",
                "upstream": f"{external_ip}:{service_port}",
            })

        print(json.dumps(mappings, indent=2))
        PY
      args:
        executable: /bin/bash
      register: lb_mappings_json_raw
      changed_when: false

    - name: Set LoadBalancer mapping facts
      ansible.builtin.set_fact:
        lb_mappings: "{{ lb_mappings_json_raw.stdout | from_json }}"

    - name: Show generated host port mappings
      ansible.builtin.debug:
        var: lb_mappings

    - name: Create Nginx index directory
      ansible.builtin.file:
        path: "{{ nginx_vcluster_index_dir }}"
        state: directory
        owner: www-data
        group: www-data
        mode: "0755"

    - name: Write mapping JSON
      ansible.builtin.copy:
        dest: "{{ nginx_vcluster_mapping_json }}"
        owner: www-data
        group: www-data
        mode: "0644"
        content: "{{ lb_mappings | to_nice_json }}"

    - name: Write Nginx stream proxy config for vCluster LoadBalancer services
      ansible.builtin.copy:
        dest: "{{ nginx_stream_conf }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          # Generated by Ansible. Do not edit manually.
          #
          # TCP pass-through proxies for vCluster LoadBalancer services.
          # Each service listens on {{ nginx_bind_ip }}:<random-port> and proxies to <external-ip>:<service-port>.

          stream {
          {% for item in lb_mappings %}
              upstream vcluster_{{ loop.index }} {
                  server {{ item.external_ip }}:{{ item.service_port }};
              }

              server {
                  listen {{ item.host_ip }}:{{ item.host_port }};
                  proxy_pass vcluster_{{ loop.index }};
                  proxy_connect_timeout 10s;
                  proxy_timeout 1h;
              }

          {% endfor %}
          }
      notify: Reload nginx

    - name: Write Nginx LoadBalancer index page
      ansible.builtin.copy:
        dest: "{{ nginx_vcluster_index_file }}"
        owner: www-data
        group: www-data
        mode: "0644"
        content: |
          <!doctype html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>vCluster LoadBalancer TCP Map</title>
            <style>
              body { font-family: sans-serif; margin: 2rem; }
              table { border-collapse: collapse; width: 100%; }
              th, td { border: 1px solid #ccc; padding: 0.5rem; text-align: left; }
              th { background: #eee; }
              code { background: #eee; padding: 0.1rem 0.25rem; }
            </style>
          </head>
          <body>
            <h1>vCluster LoadBalancer TCP Map</h1>
            <p>Generated on {{ ansible_date_time.iso8601 }}</p>
            <p>Nginx stream proxies are bound to <code>{{ nginx_bind_ip }}</code>.</p>

            {% if lb_mappings | length == 0 %}
            <p>No LoadBalancer services with an external IP were found.</p>
            {% else %}
            <table>
              <thead>
                <tr>
                  <th>Cluster</th>
                  <th>Namespace</th>
                  <th>Service</th>
                  <th>Upstream</th>
                  <th>Host Proxy</th>
                </tr>
              </thead>
              <tbody>
              {% for item in lb_mappings %}
                <tr>
                  <td><code>{{ item.cluster }}</code></td>
                  <td><code>{{ item.namespace }}</code></td>
                  <td><code>{{ item.service }}</code></td>
                  <td><code>{{ item.upstream }}</code></td>
                  <td><code>{{ item.host_ip }}:{{ item.host_port }}</code></td>
                </tr>
              {% endfor %}
              </tbody>
            </table>
            {% endif %}
          </body>
          </html>

    - name: Test Nginx config
      ansible.builtin.command: nginx -t
      changed_when: false

    - name: Ensure Nginx is running
      ansible.builtin.systemd:
        name: nginx
        state: started
        enabled: true

    - name: Show generated proxy endpoints
      ansible.builtin.debug:
        msg: >-
          {{ item.cluster }}/{{ item.namespace }}/{{ item.service }}
          upstream={{ item.upstream }}
          proxy={{ item.host_ip }}:{{ item.host_port }}
      loop: "{{ lb_mappings }}"

  handlers:
    - name: Reload nginx
      ansible.builtin.systemd:
        name: nginx
        state: reloaded
