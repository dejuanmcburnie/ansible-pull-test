---
- name: Map all vind/vCluster LoadBalancer external IP services through host Nginx TCP ports
  hosts: localhost
  connection: local
  become: true
  gather_facts: true

  vars:
    vind_user: "user"
    vind_home: "/home/{{ vind_user }}"
    vind_kubeconfig: "{{ vind_home }}/.kube/config"

    # Bind Nginx only to host private IP by default.
    nginx_bind_ip: "{{ ansible_default_ipv4.address }}"

    # User requested random ports between 30000 and 40000.
    # Note: 30000-32767 can overlap Kubernetes NodePort range.
    nginx_random_port_min: 32768
    nginx_random_port_max: 40000

    nginx_stream_conf_dir: "/etc/nginx/stream-conf.d"
    nginx_stream_conf: "{{ nginx_stream_conf_dir }}/vcluster-loadbalancers.stream.conf"

    nginx_vcluster_index_dir: "/var/www/vcluster-loadbalancers"
    nginx_vcluster_index_file: "{{ nginx_vcluster_index_dir }}/index.html"
    nginx_vcluster_mapping_json: "{{ nginx_vcluster_index_dir }}/mappings.json"

    client_services_repo_url: "git@github.com:dejuanmcburnie/ansible-pull-test.git"
    client_services_repo_branch: "main"
    client_services_repo_dir: "/opt/client-services-repo"
    client_services_subdir: "client-services"

    github_ssh_key_path: "/root/.ssh/github_vcluster_inventory"
    mappings_json_path: "/var/www/vcluster-loadbalancers/mappings.json"

    git_commit_name: "Services Mapper"
    git_commit_email: "dejuan.mcburnie@payscale.com"

  tasks:
    - name: Install required packages
      ansible.builtin.apt:
        name:
          - nginx
          - libnginx-mod-stream
          - python3
          - docker.io
          - curl
        state: present
        update_cache: true

    - name: Ensure Docker is running
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    - name: Ensure Nginx is enabled
      ansible.builtin.systemd:
        name: nginx
        enabled: true
        state: started

    - name: Ensure Docker socket allows docker group
      ansible.builtin.shell: |
        set -eux
        groupadd -f docker
        usermod -aG docker "{{ vind_user }}"
        chgrp docker /run/docker.sock
        chmod 660 /run/docker.sock
      args:
        executable: /bin/bash
      changed_when: true

    - name: Ensure Nginx stream config directory exists
      ansible.builtin.file:
        path: "{{ nginx_stream_conf_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Ensure top-level stream include exists in nginx.conf
      ansible.builtin.lineinfile:
        path: /etc/nginx/nginx.conf
        line: "include {{ nginx_stream_conf_dir }}/*.conf;"
        insertbefore: "^http\\s*\\{"
        state: present
        backup: true

    - name: Discover Docker-driver vClusters from Docker containers
      ansible.builtin.shell: |
        set -euo pipefail

        docker ps -a --format '{{ "{{" }}.Names{{ "}}" }}' \
          | sed -n 's/^vcluster\.cp\.//p' \
          | sort -u
      args:
        executable: /bin/bash
      register: discovered_vclusters_raw
      changed_when: false

    - name: Set discovered vCluster list
      ansible.builtin.set_fact:
        discovered_vclusters: "{{ discovered_vclusters_raw.stdout_lines | default([]) }}"

    - name: Show discovered vClusters
      ansible.builtin.debug:
        var: discovered_vclusters

    - name: Query LoadBalancer services from every vCluster using kubectl wide output
      ansible.builtin.shell: |
        set -euo pipefail

        CLUSTER="{{ item }}"

        sg docker -c "vcluster connect ${CLUSTER} --driver docker -- kubectl get svc -A --no-headers -o wide" \
          | awk -v cluster="$CLUSTER" '
            $3 == "LoadBalancer" && $5 != "<none>" && $5 != "<pending>" {
              namespace=$1
              service=$2
              external_ip=$5
              ports=$6

              n=split(ports, portlist, ",")
              for (i=1; i<=n; i++) {
                port_entry=portlist[i]

                # Examples:
                # 443:31398/TCP
                # 2222:31569/TCP
                # 80/TCP

                service_port=port_entry
                node_port=""
                protocol="TCP"

                sub(/\/TCP$/, "", service_port)

                if (service_port ~ /:/) {
                  split(service_port, p, ":")
                  service_port=p[1]
                  node_port=p[2]
                }

                print cluster "|" namespace "|" service "|" external_ip "|" service_port "|" service_port "|" node_port "|" protocol
              }
            }
          '
      args:
        executable: /bin/bash
      become_user: "{{ vind_user }}"
      environment:
        HOME: "{{ vind_home }}"
        KUBECONFIG: "{{ vind_kubeconfig }}"
      loop: "{{ discovered_vclusters }}"
      register: lb_query_results
      changed_when: false
      failed_when: false
      
    - name: Show per-cluster LoadBalancer query results
      ansible.builtin.debug:
        msg:
          cluster: "{{ item.item }}"
          rc: "{{ item.rc }}"
          stdout_lines: "{{ item.stdout_lines | default([]) }}"
          stderr_lines: "{{ item.stderr_lines | default([]) }}"
      loop: "{{ lb_query_results.results | default([]) }}"

    - name: Build raw LoadBalancer mapping list
      ansible.builtin.set_fact:
        lb_mappings_raw: >-
          {{
            lb_query_results.results
            | default([])
            | map(attribute='stdout_lines')
            | list
            | flatten
            | reject('equalto', '')
            | list
          }}

    - name: Show raw LoadBalancer mappings found
      ansible.builtin.debug:
        var: lb_mappings_raw

    - name: Generate stable random host ports for LoadBalancer mappings
      ansible.builtin.shell: |
        set -euo pipefail

        python3 <<'PY'
        import hashlib
        import json
        import socket
        import subprocess

        bind_ip = "{{ nginx_bind_ip }}"
        port_min = int("{{ nginx_random_port_min }}")
        port_max = int("{{ nginx_random_port_max }}")

        raw = {{ lb_mappings_raw | to_json }}

        # Ports already listening on the host. Avoid assigning new proxy ports to them.
        used_ports = set()
        try:
            out = subprocess.check_output(["ss", "-lntH"], text=True)
            for line in out.splitlines():
                parts = line.split()
                if len(parts) >= 4:
                    local = parts[3]
                    if ":" in local:
                        p = local.rsplit(":", 1)[-1]
                        if p.isdigit():
                            used_ports.add(int(p))
        except Exception:
            pass

        assigned_ports = set()
        mappings = []

        for line in sorted(set(raw)):
            cluster, namespace, svc, external_ip, service_port, target_port, node_port, protocol = line.split("|")

            key = f"{cluster}|{namespace}|{svc}|{external_ip}|{service_port}"
            digest = hashlib.sha256(key.encode()).hexdigest()
            span = port_max - port_min + 1
            candidate = port_min + (int(digest[:8], 16) % span)

            # Resolve collisions deterministically.
            selected = None
            for offset in range(span):
                port = port_min + ((candidate - port_min + offset) % span)
                if port not in used_ports and port not in assigned_ports:
                    selected = port
                    assigned_ports.add(port)
                    break

            if selected is None:
                raise SystemExit(f"No available ports in range {port_min}-{port_max}")

            mappings.append({
                "cluster": cluster,
                "namespace": namespace,
                "service": svc,
                "external_ip": external_ip,
                "service_port": int(service_port),
                "target_port": target_port,
                "node_port": node_port,
                "protocol": protocol,
                "host_ip": bind_ip,
                "host_port": selected,
                "proxy_url": f"{bind_ip}:{selected}",
                "upstream": f"{external_ip}:{service_port}",
            })

        print(json.dumps(mappings, indent=2))
        PY
      args:
        executable: /bin/bash
      register: lb_mappings_json_raw
      changed_when: false

    - name: Set LoadBalancer mapping facts
      ansible.builtin.set_fact:
        lb_mappings: "{{ lb_mappings_json_raw.stdout | from_json }}"

    - name: Show generated host port mappings
      ansible.builtin.debug:
        var: lb_mappings

    - name: Create Nginx index directory
      ansible.builtin.file:
        path: "{{ nginx_vcluster_index_dir }}"
        state: directory
        owner: www-data
        group: www-data
        mode: "0755"

    - name: Write mapping JSON
      ansible.builtin.copy:
        dest: "{{ nginx_vcluster_mapping_json }}"
        owner: www-data
        group: www-data
        mode: "0644"
        content: "{{ lb_mappings | to_nice_json }}"

    - name: Clone or update client services repo
      ansible.builtin.git:
        repo: "{{ client_services_repo_url }}"
        dest: "{{ client_services_repo_dir }}"
        version: "{{ client_services_repo_branch }}"
        update: true
        accept_hostkey: true
        key_file: "{{ github_ssh_key_path }}"
      environment:
        GIT_SSH_COMMAND: "ssh -i {{ github_ssh_key_path }} -o IdentitiesOnly=yes"
      become: true

    - name: Ensure client-services directory exists
      ansible.builtin.file:
        path: "{{ client_services_repo_dir }}/{{ client_services_subdir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      become: true

    - name: Split mappings.json into one file per vCluster
      ansible.builtin.shell: |
        set -euo pipefail

        SRC="{{ mappings_json_path }}"
        OUTDIR="{{ client_services_repo_dir }}/{{ client_services_subdir }}"

        python3 <<'PY'
        import json
        import os
        import re
        from datetime import datetime, timezone

        src = "{{ mappings_json_path }}"
        outdir = "{{ client_services_repo_dir }}/{{ client_services_subdir }}"

        with open(src, "r", encoding="utf-8") as f:
            mappings = json.load(f)

        grouped = {}
        for item in mappings:
            cluster = item.get("cluster", "")
            if not cluster:
                continue
            grouped.setdefault(cluster, []).append(item)

        os.makedirs(outdir, exist_ok=True)

        # Remove old generated JSON files so deleted clusters disappear from Git.
        for name in os.listdir(outdir):
            if name.endswith(".json"):
                os.remove(os.path.join(outdir, name))

        generated_at = datetime.now(timezone.utc).isoformat()

        for cluster, services in sorted(grouped.items()):
            safe_cluster = re.sub(r"[^a-zA-Z0-9_.-]", "-", cluster)

            payload = {
                "cluster": cluster,
                "generated_at_utc": generated_at,
                "services": services,
            }

            path = os.path.join(outdir, f"{safe_cluster}.json")
            with open(path, "w", encoding="utf-8") as f:
                json.dump(payload, f, indent=2, sort_keys=True)
                f.write("\n")
        PY
      args:
        executable: /bin/bash
      become: true
      register: split_client_services_result
      changed_when: true

    - name: Show generated client service files
      ansible.builtin.shell: |
        set -eux
        find "{{ client_services_repo_dir }}/{{ client_services_subdir }}" -maxdepth 1 -type f -name '*.json' -print -exec cat {} \;
      args:
        executable: /bin/bash
      register: generated_client_services
      changed_when: false
      become: true

    - name: Print generated client service files
      ansible.builtin.debug:
        var: generated_client_services.stdout_lines

    - name: Configure Git identity
      ansible.builtin.shell: |
        set -eux
        git config user.name "{{ git_commit_name }}"
        git config user.email "{{ git_commit_email }}"
      args:
        executable: /bin/bash
        chdir: "{{ client_services_repo_dir }}"
      become: true

    - name: Commit and push client service mappings
      ansible.builtin.shell: |
        set -euo pipefail

        git add "{{ client_services_subdir }}"

        if git diff --cached --quiet; then
          echo "No client service mapping changes to commit."
          exit 0
        fi

        git commit -m "Update vCluster client service mappings"
        git push origin "{{ client_services_repo_branch }}"
      args:
        executable: /bin/bash
        chdir: "{{ client_services_repo_dir }}"
      environment:
        GIT_SSH_COMMAND: "ssh -i {{ github_ssh_key_path }} -o IdentitiesOnly=yes"
      become: true
      register: client_services_git_push
      changed_when: "'No client service mapping changes' not in client_services_git_push.stdout"

    - name: Show client services Git push result
      ansible.builtin.debug:
        var: client_services_git_push.stdout_lines

    - name: Write Nginx stream proxy config for vCluster LoadBalancer services
      ansible.builtin.copy:
        dest: "{{ nginx_stream_conf }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          # Generated by Ansible. Do not edit manually.
          #
          # TCP pass-through proxies for vCluster LoadBalancer services.
          # Each service listens on {{ nginx_bind_ip }}:<random-port> and proxies to <external-ip>:<service-port>.

          stream {
          {% for item in lb_mappings %}
              upstream vcluster_{{ loop.index }} {
                  server {{ item.external_ip }}:{{ item.service_port }};
              }

              server {
                  listen {{ item.host_ip }}:{{ item.host_port }};
                  proxy_pass vcluster_{{ loop.index }};
                  proxy_connect_timeout 10s;
                  proxy_timeout 1h;
              }

          {% endfor %}
          }
      notify: Reload nginx

    - name: Write Nginx LoadBalancer index page
      ansible.builtin.copy:
        dest: "{{ nginx_vcluster_index_file }}"
        owner: www-data
        group: www-data
        mode: "0644"
        content: |
          <!doctype html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>vCluster LoadBalancer TCP Map</title>
            <style>
              body { font-family: sans-serif; margin: 2rem; }
              table { border-collapse: collapse; width: 100%; }
              th, td { border: 1px solid #ccc; padding: 0.5rem; text-align: left; }
              th { background: #eee; }
              code { background: #eee; padding: 0.1rem 0.25rem; }
            </style>
          </head>
          <body>
            <h1>vCluster LoadBalancer TCP Map</h1>
            <p>Generated on {{ ansible_date_time.iso8601 }}</p>
            <p>Nginx stream proxies are bound to <code>{{ nginx_bind_ip }}</code>.</p>

            {% if lb_mappings | length == 0 %}
            <p>No LoadBalancer services with an external IP were found.</p>
            {% else %}
            <table>
              <thead>
                <tr>
                  <th>Cluster</th>
                  <th>Namespace</th>
                  <th>Service</th>
                  <th>Upstream</th>
                  <th>Host Proxy</th>
                </tr>
              </thead>
              <tbody>
              {% for item in lb_mappings %}
                <tr>
                  <td><code>{{ item.cluster }}</code></td>
                  <td><code>{{ item.namespace }}</code></td>
                  <td><code>{{ item.service }}</code></td>
                  <td><code>{{ item.upstream }}</code></td>
                  <td><code>{{ item.host_ip }}:{{ item.host_port }}</code></td>
                </tr>
              {% endfor %}
              </tbody>
            </table>
            {% endif %}
          </body>
          </html>

    - name: Test Nginx config
      ansible.builtin.command: nginx -t
      changed_when: false

    - name: Ensure Nginx is running
      ansible.builtin.systemd:
        name: nginx
        state: started
        enabled: true

    - name: Show generated proxy endpoints
      ansible.builtin.debug:
        msg: >-
          {{ item.cluster }}/{{ item.namespace }}/{{ item.service }}
          upstream={{ item.upstream }}
          proxy={{ item.host_ip }}:{{ item.host_port }}
      loop: "{{ lb_mappings }}"

  handlers:
    - name: Reload nginx
      ansible.builtin.systemd:
        name: nginx
        state: reloaded
